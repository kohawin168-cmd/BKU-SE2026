<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Persiapan Sensus Ekonomi</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}
.card{
    max-width:700px;
    margin:auto;
}
</style>
</head>

<body>

<div class="container py-4">

<div class="card shadow">

<div class="card-header bg-success text-white text-center">
<h3>Form Persiapan Sensus Ekonomi</h3>
<p class="mb-0">Silakan isi data berikut</p>
</div>

<div class="card-body">

<div class="mb-3">
<label class="form-label">Nama Usaha</label>
<input type="text" id="namaUsaha" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Nama Pemilik / Penanggung Jawab</label>
<input type="text" id="pemilik" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Jenis Kelamin</label>
<select id="jk" class="form-select">
<option value="">Pilih</option>
<option>Laki-laki</option>
<option>Perempuan</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Umur</label>
<input type="number" id="umur" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">NIK</label>
<input type="text" id="nik" maxlength="16" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Nomor HP Aktif</label>
<input type="tel" id="hp" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Jenis Kegiatan Usaha</label>
<textarea id="kegiatan" class="form-control" rows="2"></textarea>
</div>

<div class="mb-3">
<label class="form-label">Produk / Jasa Utama</label>
<input type="text" id="produk" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Tahun Mulai Usaha</label>
<input type="number" id="tahun" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Jumlah Pekerja</label>
<input type="number" id="pekerja" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Perkiraan Omzet / Pendapatan per Bulan</label>
<input type="text" id="omzet" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Perkiraan Biaya Usaha per Bulan</label>
<input type="text" id="biaya" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Alamat Usaha (Jika berbeda dengan rumah)</label>
<textarea id="alamat" rows="3" class="form-control"></textarea>
</div>

<div class="d-grid">
<button onclick="kirimWA()" class="btn btn-success btn-lg">
📲 Data Siap Sensus
</button>
</div>

</div>
</div>

</div>

<script>

function kirimWA(){

let namaUsaha=document.getElementById('namaUsaha').value;
let pemilik=document.getElementById('pemilik').value;
let jk=document.getElementById('jk').value;
let umur=document.getElementById('umur').value;
let nik=document.getElementById('nik').value;
let hp=document.getElementById('hp').value;
let kegiatan=document.getElementById('kegiatan').value;
let produk=document.getElementById('produk').value;
let tahun=document.getElementById('tahun').value;
let pekerja=document.getElementById('pekerja').value;
let omzet=document.getElementById('omzet').value;
let biaya=document.getElementById('biaya').value;
let alamat=document.getElementById('alamat').value;

let pesan =
`*FORM PERSIAPAN SENSUS EKONOMI*

🏪 *Nama Usaha*
${namaUsaha}

👤 *Nama Pemilik*
${pemilik}

👨‍💼 *Jenis Kelamin*
${jk}

🎂 *Umur*
${umur}

🪪 *NIK*
${nik}

📱 *Nomor HP*
${hp}

💼 *Kegiatan Usaha*
${kegiatan}

📦 *Produk/Jasa Utama*
${produk}

📅 *Tahun Mulai Usaha*
${tahun}

👥 *Jumlah Pekerja*
${pekerja}

💰 *Perkiraan Omzet/Bulan*
${omzet}

💸 *Perkiraan Biaya/Bulan*
${biaya}

📍 *Alamat Usaha*
${alamat}

Terima kasih.`;

let nomor="6285178509892";

let url="https://wa.me/"+nomor+"?text="+encodeURIComponent(pesan);

window.open(url,"_blank");

}

</script>

</body>
    </html>
