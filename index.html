<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Form Persiapan Sensus Ekonomi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
            <h3>Form Persiapan Sensus Ekonomi</h3>
            <small>Data yang perlu disiapkan sebelum survei</small>
        </div>

        <div class="card-body">

            <div class="mb-3">
                <label class="form-label">Nama Usaha</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Nama Pemilik / Penanggung Jawab</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Jenis Kelamin</label>
                <select class="form-select">
                    <option>Laki-laki</option>
                    <option>Perempuan</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Umur</label>
                <input type="number" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">NIK</label>
                <input type="text" maxlength="16" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Nomor HP Aktif</label>
                <input type="tel" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Jenis Kegiatan Usaha</label>
                <textarea class="form-control" rows="2"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Produk/Jasa Utama</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Tahun Mulai Usaha</label>
                <input type="number" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Jumlah Pekerja</label>
                <input type="number" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Perkiraan Omzet/Pendapatan per Bulan</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Perkiraan Biaya Usaha per Bulan</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Alamat Usaha (Jika berbeda dengan rumah)</label>
                <textarea class="form-control" rows="3"></textarea>
            </div>

            <div class="alert alert-info">
                <strong>Catatan:</strong><br>
                Data ini digunakan untuk mempercepat proses pendataan Sensus Ekonomi dan dijamin kerahasiaannya oleh BPS.
            </div>

            <button class="btn btn-success w-100">
                Data Siap untuk Survei
            </button>

        </div>
    </div>
</div>

</body>
</html>
